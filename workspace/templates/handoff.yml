# Task Handoff Template
# Used by Tom when delegating tasks to specialist agents.
# Copy and fill in before spawning a subagent session.

handoff_id: "<unique-id>"           # e.g., "2026-02-26-ninja-api-build"
timestamp: "<YYYY-MM-DD HH:MM>"
from: "main"                        # Delegating agent (usually Tom)
to: "<agent_id>"                    # Target agent
priority: "normal"                  # low | normal | high | urgent
channel_source: "<channel>"         # whatsapp | telegram | web | cron | internal

task:
  title: "<one-line summary>"
  description: |
    <detailed description of what needs to be done>
  constraints:
    - "<constraint 1>"
    - "<constraint 2>"
  expected_output: "<what the agent should deliver>"
  deadline: "<YYYY-MM-DD or 'none'>"
  files:
    - "<path/to/relevant/file>"

context:
  prior_work: |
    <summary of any previous work on this task>
  related_agents: []                 # Other agents involved in this task chain
  user_preferences: |
    <any known user preferences relevant to this task>
  memory_refs:
    - "<memory/YYYY-MM-DD.md#section>"

permission_tier: 2                   # 1=open, 2=logged, 3=approval, 4=denied
escalation_contact: "main"           # Who to escalate to (usually Tom)
