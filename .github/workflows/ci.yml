name: ClawOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-configs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate all JSON configs
        run: |
          for f in config.json workspace/security-policy.json cron/jobs.json; do
            echo "Validating $f..."
            python3 -c "import json; json.load(open('$f'))" || exit 1
          done
          for f in agents/*/config.json skills/*/manifest.json; do
            echo "Validating $f..."
            python3 -c "import json; json.load(open('$f'))" || exit 1
          done

      - name: Check agent prompts exist
        run: |
          for agent in ninja ops cto accounting finance legal marketing; do
            test -f "agents/$agent/prompts/system.md" || { echo "Missing: agents/$agent/prompts/system.md"; exit 1; }
          done

      - name: Check for leaked secrets
        run: |
          if grep -rn "sk-ant-api\|sk-proj-\|ANTHROPIC_API_KEY=" . \
            --include="*.json" --include="*.md" --include="*.ts" --include="*.sh" \
            --exclude-dir=node_modules --exclude-dir=.git; then
            echo "ERROR: Potential API key found in source!"
            exit 1
          fi

      - name: Run config tests
        run: node --test tests/configs.test.mjs

  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: cd apps/dashboard && npm ci
      - name: Build
        run: cd apps/dashboard && npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [validate-configs, build-dashboard]
    steps:
      - uses: actions/checkout@v4
      - name: Build gateway image
        run: docker build -f Dockerfile.prod -t clawos-gateway:ci .
      - name: Build dashboard image
        run: docker build -f apps/dashboard/Dockerfile -t clawos-dashboard:ci apps/dashboard/
