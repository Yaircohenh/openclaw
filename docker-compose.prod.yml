# ClawOS Production — Gateway Only
# Dashboard lives in its own repo: https://github.com/Yaircohenh/clawos-dashboard

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "18789:18789"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - clawos-state:/home/clawos/.openclaw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "openclaw", "health"]
      interval: 30s
      timeout: 10s

volumes:
  clawos-state:
